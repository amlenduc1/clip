version: '3.8'
services:
  opensearch:
    image: opensearchproject/opensearch:2.13.0
    container_name: opensearch
    environment:
      - discovery.type=single-node
      - plugins.security.disabled=true
      - bootstrap.memory_lock=true
      - OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=SeM!Def3ct#2026
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      - 9200:9200
    networks:
      - semnet

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.13.0
    container_name: opensearch-dashboards
    ports:
      - 5601:5601
    environment:
      - OPENSEARCH_HOSTS=["http://opensearch:9200"]
      - DISABLE_SECURITY_DASHBOARDS_PLUGIN=true
    depends_on:
      - opensearch
    networks:
      - semnet

  clip_model:
    build: ./clip_model
    container_name: clip_model
    ports:
      - 5001:5001
    networks:
      - semnet

  backend:
    build: ./backend
    container_name: backend
    depends_on:
      - opensearch
      - clip_model
    ports:
      - 8000:8000
    volumes:
      - ./data:/app/data
    environment:
      - BACKEND_URL=http://backend:8000/index-image/
      - ZIP_PATH=/app/data/archive.zip
      - EXTRACT_DIR=/app/data/images
    networks:
      - semnet

  frontend:
    build: ./frontend
    container_name: frontend
    depends_on:
      - backend
    ports:
      - 8501:8501
    networks:
      - semnet

networks:
  semnet:
    driver: bridge
